apiVersion: v1
kind: Namespace
metadata:
  name: kubemind
  labels:
    name: kubemind

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kubemind-config
  namespace: kubemind
data:
  APP_NAME: "KubeMind AI"
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  DB_ECHO: "false"
  API_TITLE: "KubeMind AI Platform"

---
apiVersion: v1
kind: Secret
metadata:
  name: kubemind-secrets
  namespace: kubemind
type: Opaque
stringData:
  DATABASE_URL: "postgresql://kubemind:kubemind@postgres:5432/kubemind"
  REDIS_URL: "redis://redis:6379/0"
  QDRANT_URL: "http://qdrant:6333"
  JWT_SECRET_KEY: "your-secret-key-change-in-production"
  OLLAMA_API_BASE: "http://ollama:11434"

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: kubemind
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: kubemind
        - name: POSTGRES_USER
          value: kubemind
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: kubemind-secrets
              key: DATABASE_URL
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "500m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U kubemind
          initialDelaySeconds: 30
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: kubemind
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: kubemind
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 10
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: kubemind
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: kubemind
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
      - name: qdrant
        image: qdrant/qdrant:latest
        ports:
        - containerPort: 6333
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "768Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 6333
          initialDelaySeconds: 20
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: kubemind
spec:
  selector:
    app: qdrant
  ports:
  - port: 6333
    targetPort: 6333
