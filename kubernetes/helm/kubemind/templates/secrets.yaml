---
# Database Secret
{{- if .Values.backend.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubemind.fullname" . }}-db-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "kubemind.labels" . | nindent 4 }}
    component: database
type: Opaque
data:
  password: {{ .Values.backend.secrets.database.password | b64enc | quote }}
{{- end }}

---
# Grafana Admin Secret
{{- if and .Values.observability.enabled .Values.observability.grafana.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubemind.fullname" . }}-grafana-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "kubemind.labels" . | nindent 4 }}
    component: grafana
type: Opaque
data:
  admin-password: {{ .Values.observability.grafana.adminPassword | b64enc | quote }}
{{- end }}

---
# Image Pull Secret (if using private registry)
{{- if .Values.imagePullSecrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubemind.fullname" . }}-registry
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "kubemind.labels" . | nindent 4 }}
type: kubernetes.io/dockercfg
data:
  .dockercfg: {{ .Values.imagePullSecrets | b64enc | quote }}
{{- end }}
