---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubemind.fullname" . }}-backend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "kubemind.labels" . | nindent 4 }}
    component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "kubemind.selectorLabels" . | nindent 4 }}
    component: backend

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubemind.fullname" . }}-frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "kubemind.labels" . | nindent 4 }}
    component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "kubemind.selectorLabels" . | nindent 4 }}
    component: frontend

---
# Prometheus Service
{{- if and .Values.observability.enabled .Values.observability.prometheus.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubemind.fullname" . }}-prometheus
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "kubemind.labels" . | nindent 4 }}
    component: prometheus
spec:
  type: {{ .Values.observability.prometheus.service.type }}
  ports:
    - port: {{ .Values.observability.prometheus.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "kubemind.selectorLabels" . | nindent 4 }}
    component: prometheus
{{- end }}

