---
# Loki Service
{{- if and .Values.observability.enabled .Values.observability.loki.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubemind.fullname" . }}-loki
  namespace: {{ .Values.global.namespace }}
  labels:
