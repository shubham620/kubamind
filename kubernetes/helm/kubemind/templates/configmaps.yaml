---
# Prometheus Configuration
{{- if and .Values.observability.enabled .Values.observability.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubemind.fullname" . }}-prometheus-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "kubemind.labels" . | nindent 4 }}
    component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    
    scrape_configs:
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https
      
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics
      
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name
      
      - job_name: 'kubemind-backend'
        static_configs:
          - targets: ['{{ include "kubemind.fullname" . }}-backend:{{ .Values.backend.service.port }}']
        metrics_path: '/metrics'
{{- end }}

---
# Loki Configuration
{{- if and .Values.observability.enabled .Values.observability.loki.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubemind.fullname" . }}-loki-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "kubemind.labels" . | nindent 4 }}
    component: loki
data:
  local-config.yaml: |
    auth_enabled: false
    
    ingester:
      chunk_idle_period: 3m
      chunk_retain_period: 1m
      max_chunk_age: 1h
      chunk_encoding: snappy
      chunk_compress: true
      lifecycler:
        rate_limit_enabled: false
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1
    
    limits_config:
      enforce_metric_name: false
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      ingestion_rate_mb: 8
      ingestion_burst_size_mb: 16
    
    schema_config:
      configs:
        - from: 2024-01-01
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h
    
    server:
      http_listen_port: {{ .Values.observability.loki.service.targetPort }}
      log_level: info
    
    storage_config:
      boltdb_shipper:
        active_index_directory: /loki/boltdb-shipper-active
        cache_location: /loki/boltdb-shipper-cache
        shared_store: filesystem
      filesystem:
        directory: /loki/chunks
    
    chunk_store_config:
      max_look_back_period: 0s
    
    table_manager:
      retention_deletes_enabled: false
      retention_period: 0s
{{- end }}

---
# Backend Configuration
{{- if .Values.backend.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubemind.fullname" . }}-backend-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "kubemind.labels" . | nindent 4 }}
    component: backend
data:
  {{- range $key, $value := .Values.backend.environment }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}

---
# Frontend Configuration
{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubemind.fullname" . }}-frontend-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "kubemind.labels" . | nindent 4 }}
    component: frontend
data:
  {{- range $key, $value := .Values.frontend.environment }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
