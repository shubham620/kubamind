apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: kubemind
  labels:
    app: payment-service
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        version: v1
    spec:
      containers:
      - name: payment
        image: nginx:latest
        ports:
        - containerPort: 8082
          name: http
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        env:
        - name: SERVICE_NAME
          value: "payment-service"
        - name: SERVICE_PORT
          value: "8082"

---

apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: kubemind
  labels:
    app: payment-service
spec:
  selector:
    app: payment-service
  type: ClusterIP
  ports:
  - protocol: TCP
    port: 8082
    targetPort: 8082
    name: http
