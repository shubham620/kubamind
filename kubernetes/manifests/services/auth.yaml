apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: kubemind
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth
        image: nginx:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

---

apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: kubemind
spec:
  selector:
    app: auth-service
  type: ClusterIP
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
