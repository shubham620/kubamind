apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: kubemind
  labels:
    app: notification-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        version: v1
    spec:
      containers:
      - name: notification
        image: nginx:latest
        ports:
        - containerPort: 8083
          name: http
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8083
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8083
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        env:
        - name: SERVICE_NAME
          value: "notification-service"
        - name: SERVICE_PORT
          value: "8083"

---

apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: kubemind
  labels:
    app: notification-service
spec:
  selector:
    app: notification-service
  type: ClusterIP
  ports:
  - protocol: TCP
    port: 8083
    targetPort: 8083
    name: http
