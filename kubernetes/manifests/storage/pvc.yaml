apiVersion: v1
kind: StorageClass
metadata:
  name: kubemind-storage
provisioner: kubernetes.io/host-path
volumeBindingMode: Immediate

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: kubemind
spec:
  storageClassName: kubemind-storage
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---

apiVersion: v1
