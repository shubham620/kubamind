apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: kubemind
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin123"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

---

apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: kubemind
spec:
  selector:
    app: grafana
  type: LoadBalancer
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
